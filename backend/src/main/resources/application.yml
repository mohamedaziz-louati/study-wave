server:
  port: 8081

spring:
  application:
    name: study-wave-backend

  profiles:
    active: dev

jwt:
  # JJWT HS256 requires a key size >= 256 bits (>=32 bytes).
  # Use a longer default so the app runs out-of-the-box.
  secret: ${JWT_SECRET:dev-secret-dev-secret-dev-secret-dev-secret}
  expiration: 86400000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.studywave: DEBUG
    org.springframework.security: DEBUG
